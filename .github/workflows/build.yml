name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK and CMake
      run: |
        sdkmanager --install "ndk;25.2.9519653"
        sdkmanager --install "cmake;3.22.1"

    - name: Download Paddle Lite libraries
      run: |
        mkdir -p PaddleLite
        curl -sL https://paddleocr.bj.bcebos.com/libs/paddle_lite_libs_v2_10.tar.gz -o /tmp/paddle_lite.tar.gz
        tar xzf /tmp/paddle_lite.tar.gz -C PaddleLite/
        echo "=== PaddleLite structure ==="
        find PaddleLite -maxdepth 4 -type f | head -30

    - name: Download OpenCV SDK
      run: |
        curl -sL https://paddlelite-demo.bj.bcebos.com/libs/android/opencv-4.2.0-android-sdk.tar.gz -o /tmp/opencv.tar.gz
        mkdir -p OpenCV
        tar xzf /tmp/opencv.tar.gz -C OpenCV/
        # Check if there's a nested directory
        if [ -d "OpenCV/OpenCV-android-sdk" ]; then
          mv OpenCV/OpenCV-android-sdk/* OpenCV/ || true
        fi
        echo "=== OpenCV structure ==="
        find OpenCV -maxdepth 4 -type d | head -20

    - name: Download OCR Models (nb format for PaddleLite)
      run: |
        mkdir -p app/src/main/assets/models app/src/main/assets/labels
        # PP-OCRv3 det model (.nb format)
        curl -sL https://paddleocr.bj.bcebos.com/PP-OCRv3/chinese/ch_PP-OCRv3_det_slim_infer.nb -o app/src/main/assets/models/det_db.nb
        # PP-OCRv3 rec model (.nb format)
        curl -sL https://paddleocr.bj.bcebos.com/PP-OCRv3/chinese/ch_PP-OCRv3_rec_slim_infer.nb -o app/src/main/assets/models/rec_crnn.nb
        # cls model (.nb format)
        curl -sL https://paddleocr.bj.bcebos.com/PP-OCRv2/lite/ch_ppocr_mobile_v2.0_cls_slim_opt.nb -o app/src/main/assets/models/cls.nb
        # dictionary
        curl -sL https://paddleocr.bj.bcebos.com/dygraph_v2.0/lite/ch_dict.tar.gz | tar xz -C app/src/main/assets/labels/
        echo "=== Models ==="
        ls -lh app/src/main/assets/models/
        echo "=== Labels ==="
        ls -lh app/src/main/assets/labels/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Configure NDK path
      run: echo "ndk.dir=/usr/local/lib/android/sdk/ndk/25.2.9519653" > local.properties

    - name: Build Debug APK
      run: |
        set -o pipefail
        ./gradlew assembleDebug 2>&1 | tail -50
        ls -lh app/build/outputs/apk/debug/ || true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK
      run: |
        set -o pipefail
        ./gradlew assembleRelease 2>&1 | tail -30
        ls -lh app/build/outputs/apk/release/ || true

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
